name: MagiaCN Asset Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 git
        run: |
          git config user.name  "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git config rebase.autoStash true

      # ── 1. 智能检测变动范围 ────────────────────────────────
      - name: 检测变动范围
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "ALL")
          echo "本次提交变动文件:"
          echo "$CHANGED"

          HAS_RESOURCE=0
          HAS_SCENARIO=0
          HAS_JS=0

          echo "$CHANGED" | grep -qE '^madomagi/resource/' && HAS_RESOURCE=1 || true
          echo "$CHANGED" | grep -qE '^madomagi/resource/scenario/json/' && HAS_SCENARIO=1 || true
          echo "$CHANGED" | grep -qE '^magica/js/libs/' && HAS_JS=1 || true

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            HAS_RESOURCE=1
            HAS_SCENARIO=1
            HAS_JS=1
          fi

          echo "HAS_RESOURCE=$HAS_RESOURCE" >> $GITHUB_OUTPUT
          echo "HAS_SCENARIO=$HAS_SCENARIO" >> $GITHUB_OUTPUT
          echo "HAS_JS=$HAS_JS"             >> $GITHUB_OUTPUT

          mkdir -p _artifacts

      # ── 2. [任务 A] JS 热更（不下载任何资源，纯本地） ──────
      - name: "[任务 A] 生成 JS 并打包热更"
        if: steps.detect.outputs.HAS_JS == '1'
        run: |
          pip3 install requests 2>/dev/null || true
          if [ -f "requirements_js.txt" ]; then
            pip3 install -r requirements_js.txt
          fi

          echo "🚀 运行 Build_JS_Injector.py..."
          python3 Build_JS_Injector.py

          echo "📦 打包 cn_js_update.zip..."
          mkdir -p _pack_js/magica/js/libs
          find magica/js/libs/ -name "*.js" -exec cp {} _pack_js/magica/js/libs/ \;
          cd _pack_js && zip -r ../cn_js_update.zip magica/ && cd ..
          echo "大小: $(du -sh cn_js_update.zip | cut -f1)"

          echo "📝 更新 version_js.json..."
          python3 - <<'PYEOF'
          import json, hashlib
          f = "version_js.json"
          import os
          d = json.load(open(f)) if os.path.exists(f) else {"version": 0, "size": 0, "md5": ""}
          h = hashlib.md5()
          with open("cn_js_update.zip", "rb") as fp:
              data = fp.read()
              h.update(data)
          d["version"] += 1
          d["size"] = len(data)
          d["md5"]  = h.hexdigest()
          json.dump(d, open(f, "w"), indent=2)
          print(f"version_js.json => {json.dumps(d)}")
          PYEOF

          cp cn_js_update.zip _artifacts/
          cp version_js.json  _artifacts/

      # ── 3. [任务 B] 剧情热更（纯本地，秒完成） ────────────
      - name: "[任务 B] 剧情 JSON 打包热更"
        if: steps.detect.outputs.HAS_SCENARIO == '1'
        run: |
          echo "📦 打包 cn_scenario_update.zip..."
          mkdir -p _pack_scn/madomagi/resource/scenario/json
          cp -r madomagi/resource/scenario/json/. \
                _pack_scn/madomagi/resource/scenario/json/
          cd _pack_scn && zip -r ../cn_scenario_update.zip madomagi/ && cd ..
          echo "大小: $(du -sh cn_scenario_update.zip | cut -f1)"

          echo "📝 更新 version_scenario.json..."
          python3 - <<'PYEOF'
          import json, hashlib, os
          f = "version_scenario.json"
          d = json.load(open(f)) if os.path.exists(f) else {"version": 0, "size": 0, "md5": ""}
          h = hashlib.md5()
          with open("cn_scenario_update.zip", "rb") as fp:
              data = fp.read()
              h.update(data)
          d["version"] += 1
          d["size"] = len(data)
          d["md5"]  = h.hexdigest()
          json.dump(d, open(f, "w"), indent=2)
          print(f"version_scenario.json => {json.dumps(d)}")
          PYEOF

          cp cn_scenario_update.zip _artifacts/
          cp version_scenario.json  _artifacts/

      # ── 4. [任务 C] 全量更新 DB + asset_main.json ─────────
      #   触发条件：madomagi/resource/ 下任意文件有变动
      - name: "[任务 C] 下载资源包并还原游戏文件系统"
        if: steps.detect.outputs.HAS_RESOURCE == '1'
        run: |
          pip3 install requests

          mkdir -p _game_res
          cd _game_res

          echo "📥 并发下载所有汉化资源包..."
          wget -q "https://restless-field-06c7.crynetsystemscell.workers.dev/cn_base_02.zip"       &
          wget -q "https://restless-field-06c7.crynetsystemscell.workers.dev/cn_base_03.zip"       &
          wget -q "https://restless-field-06c7.crynetsystemscell.workers.dev/cn_base_04.zip"       &
          wget -q "https://restless-field-06c7.crynetsystemscell.workers.dev/cn_base_05.zip"       &
          wget -q "https://restless-field-06c7.crynetsystemscell.workers.dev/cn_base_06.zip"       &
          wget -q "https://restless-field-06c7.crynetsystemscell.workers.dev/cn_magica_resource.zip" &
          wget -q "https://restless-field-06c7.crynetsystemscell.workers.dev/cn_scenario_img.zip"  &
          wget -q "https://github.com/HiiragiNemu/magireco-cn-patch/releases/download/latest/cn_base_01_json.zip" &
          wait

          echo "📦 解压全部资源包..."
          for z in *.zip; do
            echo "  解压 $z ..."
            unzip -q -o "$z"
            rm "$z"
          done
          cd ..

      - name: "[任务 C] 将仓库最新文件覆盖入游戏文件系统"
        if: steps.detect.outputs.HAS_RESOURCE == '1'
        run: |
          echo "🔄 覆盖 madomagi/ ..."
          cp -af madomagi/. _game_res/madomagi/ 2>/dev/null || true

      - name: "[任务 C] 运行 update_asset_main.py 重新计算 MD5"
        if: steps.detect.outputs.HAS_RESOURCE == '1'
        run: |
          echo "🚀 运行 scripts/update_asset_main.py ..."
          python3 scripts/update_asset_main.py \
            --resource-dir _game_res/madomagi/resource \
            --original-json madomagi/asset_main.json \
            --output-json   madomagi/asset_main.json

      - name: "[任务 C] 运行 patch_db.py 将新 MD5 写入 DB"
        if: steps.detect.outputs.HAS_RESOURCE == '1'
        run: |
          echo "🚀 运行 scripts/patch_db.py ..."
          python3 scripts/patch_db.py \
            --json-path madomagi/asset_main.json \
            --db-path   madomagi/madomagi.db

      - name: "[任务 C] 打包 cn_base_00_db.zip"
        if: steps.detect.outputs.HAS_RESOURCE == '1'
        run: |
          echo "📦 打包 cn_base_00_db.zip ..."
          mkdir -p _db_pack/madomagi
          cp madomagi/madomagi.db _db_pack/madomagi/madomagi.db
          cd _db_pack && zip -r ../cn_base_00_db.zip madomagi/ && cd ..
          echo "大小: $(du -sh cn_base_00_db.zip | cut -f1)"

          cp cn_base_00_db.zip          _artifacts/
          cp madomagi/asset_main.json   _artifacts/

      # ── 5. 统一提交变更到仓库 ─────────────────────────────
      - name: 提交更新文件到仓库
        run: |
          git pull --rebase --autostash origin main

          # 分别 add，找不到时不报错
          git add madomagi/asset_main.json       2>/dev/null || true
          git add madomagi/madomagi.db           2>/dev/null || true
          git add version_scenario.json          2>/dev/null || true
          git add version_js.json                2>/dev/null || true
          git add magica/js/libs/                2>/dev/null || true

          if git diff --cached --quiet; then
            echo "无文件变动，跳过 Commit"
          else
            git commit -m "Auto: 更新产物 $(date -u +'%Y-%m-%d %H:%M UTC')"
            n=0
            until git push; do
              n=$((n+1))
              [ $n -ge 5 ] && { echo "Push 失败超过5次，放弃"; exit 1; }
              echo "Push 失败，第 ${n} 次重试..."
              git pull --rebase --autostash origin main
              sleep $((n * 3))
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. 上传产物到 latest Release（只覆盖本次生成的文件） ──
      - name: 发布到 GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(ls -A _artifacts 2>/dev/null)" ]; then
            echo "本次无产物需要发布，跳过"
            exit 0
          fi

          echo "📤 上传以下文件到 latest release:"
          ls -lh _artifacts/

          # 确保 latest tag 存在
          gh release view latest --repo ${{ github.repository }} > /dev/null 2>&1 || \
          gh release create latest \
            --repo ${{ github.repository }} \
            --title "最新汉化资源包" \
            --notes "MagiaCN 自动构建" \
            --latest

          # --clobber：只覆盖同名文件，不删除其他文件
          gh release upload latest _artifacts/* \
            --repo ${{ github.repository }} \
            --clobber
