name: MagiaCN Asset Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 git
        run: |
          git config user.name  "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git config rebase.autoStash true

      - name: 安装依赖
        run: pip3 install requests

      - name: 获取MD5和Size，生成所有JSON
        run: |
          python3 - <<'PYEOF'
          import requests, hashlib, json, base64, binascii, os

          R2 = "https://restless-field-06c7.crynetsystemscell.workers.dev"
          GH = "https://github.com/HiiragiNemu/magireco-cn-patch/releases/download/latest"

          def get_r2_info(url):
              print(f"  [HEAD] {url.split('/')[-1]}")
              try:
                  r = requests.head(url, timeout=30, allow_redirects=True)
                  r.raise_for_status()
                  size = int(r.headers.get("Content-Length", 0))
                  md5_b64 = r.headers.get("Content-MD5", "")
                  if md5_b64:
                      md5 = binascii.hexlify(base64.b64decode(md5_b64)).decode()
                      print(f"         size={size} md5={md5} (HEAD)")
                      return size, md5
                  etag = r.headers.get("ETag", "").strip('"')
                  if len(etag) == 32 and all(c in '0123456789abcdef' for c in etag):
                      print(f"         size={size} md5={etag} (ETag)")
                      return size, etag
              except Exception as e:
                  print(f"         HEAD失败: {e}")
              print(f"  [流式下载] {url.split('/')[-1]}")
              r = requests.get(url, stream=True, timeout=600, allow_redirects=True)
              r.raise_for_status()
              h = hashlib.md5()
              size = 0
              for chunk in r.iter_content(4 * 1024 * 1024):
                  h.update(chunk)
                  size += len(chunk)
              md5 = h.hexdigest()
              print(f"         size={size} md5={md5} (流式)")
              return size, md5

          def get_gh_info(url):
              print(f"  [下载] {url.split('/')[-1]}")
              r = requests.get(url, stream=True, timeout=300, allow_redirects=True)
              r.raise_for_status()
              h = hashlib.md5()
              size = 0
              for chunk in r.iter_content(1024 * 1024):
                  h.update(chunk)
                  size += len(chunk)
              md5 = h.hexdigest()
              print(f"         size={size} md5={md5}")
              return size, md5

          def entry(fake_path, size, md5):
              return {
                  "file_list": [{"size": size, "url": fake_path}],
                  "md5":  md5,
                  "path": fake_path
              }

          zip_info = {}

          print("[R2 包]")
          r2_zips = [
              ("cn_zips/cn_base_02.zip",          f"{R2}/cn_base_02.zip"),
              ("cn_zips/cn_base_03.zip",          f"{R2}/cn_base_03.zip"),
              ("cn_zips/cn_base_04.zip",          f"{R2}/cn_base_04.zip"),
              ("cn_zips/cn_base_05.zip",          f"{R2}/cn_base_05.zip"),
              ("cn_zips/cn_base_06.zip",          f"{R2}/cn_base_06.zip"),
              ("cn_zips/cn_magica_resource.zip",  f"{R2}/cn_magica_resource.zip"),
              ("cn_zips/cn_scenario_img.zip",     f"{R2}/cn_scenario_img.zip"),
              ("cn_zips/cn_voice_01.zip",         f"{R2}/cn_voice_01.zip"),
              ("cn_zips/cn_voice_02_done.zip",    f"{R2}/cn_voice_02_done.zip"),
          ]
          for fake, real in r2_zips:
              size, md5 = get_r2_info(real)
              zip_info[fake] = {"size": size, "md5": md5, "real_url": real}

          print("\n[GitHub 包]")
          gh_zips = [
              ("cn_zips/cn_base_01_json.zip", f"{GH}/cn_base_01_json.zip"),
              # cn_base_00_db.zip 的 MD5/size 在打包新DB后才能确定，最后单独处理
          ]
          for fake, real in gh_zips:
              size, md5 = get_gh_info(real)
              zip_info[fake] = {"size": size, "md5": md5, "real_url": real}

          os.makedirs("madomagi", exist_ok=True)

          # 先保存不含DB包的 zip_info，供后续DB打包步骤使用
          json.dump(
              {k: {"size": v["size"], "md5": v["md5"]}
               for k, v in zip_info.items()},
              open("zip_md5_nodb.json", "w"), indent=2
          )

          # voice / fullvoice JSON（不含DB）
          asset_voice = [entry(
              "cn_zips/cn_voice_01.zip",
              zip_info["cn_zips/cn_voice_01.zip"]["size"],
              zip_info["cn_zips/cn_voice_01.zip"]["md5"]
          )]
          asset_fullvoice = [entry(
              "cn_zips/cn_voice_02_done.zip",
              zip_info["cn_zips/cn_voice_02_done.zip"]["size"],
              zip_info["cn_zips/cn_voice_02_done.zip"]["md5"]
          )]

          def dump(path, obj):
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(obj, f, separators=(',', ':'), ensure_ascii=False)
              print(f"✓ {path} ({len(obj)} 条)")

          dump("madomagi/asset_voice.json",    asset_voice)
          dump("madomagi/asset_fullvoice.json", asset_fullvoice)

          json.dump(
              {k: v["real_url"] for k, v in zip_info.items()},
              open("url_map.json", "w"), indent=2
          )
          print(f"✓ url_map.json ({len(zip_info)} 条)")
          print("\n✅ 第一阶段完成（等待DB打包后生成最终asset_main.json）")
          PYEOF

      - name: 构建 madomagi.db（写入所有cn_zips MD5）
        run: |
          python3 - <<'PYEOF'
          import json, sqlite3, os

          DB_PATH   = "madomagi/madomagi.db"
          ZMD5_PATH = "zip_md5_nodb.json"

          os.makedirs("madomagi", exist_ok=True)
          zmd5 = json.load(open(ZMD5_PATH))
          conn = sqlite3.connect(DB_PATH)
          cur  = conn.cursor()

          cur.execute("SELECT name FROM sqlite_master WHERE type='table'")
          tables = [r[0] for r in cur.fetchall()]
          print(f"DB 表: {tables}")

          cur.execute("""
              CREATE TABLE IF NOT EXISTS download_asset (
                  path TEXT PRIMARY KEY,
                  md5  TEXT NOT NULL
              )
          """)

          # ★ 关键：DB里只写入 cn_base_01..06 和资源包的MD5
          # ★ 不写入 cn_base_00_db.zip 自身（否则游戏会跳过DB包下载）
          # ★ 不写入 voice 包（由 asset_voice.json 单独控制）
          skip = {"cn_zips/cn_voice_01.zip", "cn_zips/cn_voice_02_done.zip"}
          count = 0
          for fake_path, info in zmd5.items():
              if fake_path in skip:
                  print(f"  [跳过voice] {fake_path}")
                  continue
              cur.execute(
                  "INSERT OR REPLACE INTO download_asset (path, md5) VALUES (?, ?)",
                  (fake_path, info["md5"])
              )
              print(f"  {fake_path} → {info['md5']}")
              count += 1

          # 清除 asset_json 缓存（强制游戏重新获取manifest）
          if "asset_json" in tables:
              cur.execute("DELETE FROM asset_json")
              print("✓ asset_json 缓存清空")

          conn.commit()
          conn.close()
          print(f"\n✅ download_asset 写入 {count} 条")
          PYEOF

      - name: 打包 cn_base_00_db.zip（含最新DB，内部路径对齐游戏解压目标）
        run: |
          # 游戏解压到 /data/data/io.kamihama.totentanz/files/
          # 所以zip内部路径必须是 madomagi/madomagi.db
          mkdir -p _db_pack/madomagi
          cp madomagi/madomagi.db _db_pack/madomagi/madomagi.db

          # 同时打包 flag 文件，解压后游戏知道基础包已完成
          mkdir -p _db_pack/madomagi/magica
          echo "done" > _db_pack/madomagi/magica/cn_base_done.flag

          cd _db_pack
          zip -r ../cn_base_00_db.zip madomagi/
          cd ..
          echo "DB包大小: $(du -sh cn_base_00_db.zip | cut -f1)"
          echo "DB包内容:"
          unzip -l cn_base_00_db.zip

      - name: 计算 cn_base_00_db.zip 的 MD5/Size，生成最终 asset_main.json
        run: |
          python3 - <<'PYEOF'
          import json, hashlib, os

          # 计算刚打包的DB zip
          h = hashlib.md5()
          size = 0
          with open("cn_base_00_db.zip", "rb") as f:
              for chunk in iter(lambda: f.read(1024*1024), b""):
                  h.update(chunk)
                  size += len(chunk)
          db_md5  = h.hexdigest()
          db_size = size
          print(f"cn_base_00_db.zip: size={db_size} md5={db_md5}")

          # 读取其他包信息
          zmd5 = json.load(open("zip_md5_nodb.json"))

          # 写入完整 zip_md5.json（含DB包）
          zmd5["cn_zips/cn_base_00_db.zip"] = {
              "size": db_size,
              "md5":  db_md5
          }
          json.dump(zmd5, open("zip_md5.json", "w"), indent=2)
          print("✓ zip_md5.json（含DB包）")

          def entry(fake_path, size, md5):
              return {
                  "file_list": [{"size": size, "url": fake_path}],
                  "md5":  md5,
                  "path": fake_path
              }

          # ★★★ asset_main.json 顺序：
          # 1. cn_base_00_db.zip 放【最前面】，游戏先下载DB
          # 2. 其余资源包按顺序
          # 游戏下载完DB包后，DB里已有其余包的MD5记录
          # 但其余包的实际文件不存在 → 游戏会继续下载
          main_order = [
              "cn_zips/cn_base_00_db.zip",      # ★ DB最先装
              "cn_zips/cn_base_01_json.zip",
              "cn_zips/cn_base_02.zip",
              "cn_zips/cn_base_03.zip",
              "cn_zips/cn_base_04.zip",
              "cn_zips/cn_base_05.zip",
              "cn_zips/cn_base_06.zip",
              "cn_zips/cn_magica_resource.zip",
              "cn_zips/cn_scenario_img.zip",
          ]

          asset_main = [
              entry(p, zmd5[p]["size"], zmd5[p]["md5"])
              for p in main_order
          ]

          with open("madomagi/asset_main.json", "w", encoding="utf-8") as f:
              json.dump(asset_main, f, separators=(',', ':'), ensure_ascii=False)
          print(f"✓ asset_main.json ({len(asset_main)} 条，DB在首位)")

          # 更新 url_map.json 加入DB包
          GH = "https://github.com/HiiragiNemu/magireco-cn-patch/releases/download/latest"
          url_map = json.load(open("url_map.json"))
          url_map["cn_zips/cn_base_00_db.zip"] = f"{GH}/cn_base_00_db.zip"
          json.dump(url_map, open("url_map.json", "w"), indent=2)
          print("✓ url_map.json 更新")
          print("\n✅ 全部完成")
          PYEOF

      - name: 提交所有变更
        run: |
          git pull --rebase --autostash origin main
          git add madomagi/asset_main.json \
                  madomagi/asset_voice.json \
                  madomagi/asset_fullvoice.json \
                  madomagi/madomagi.db \
                  url_map.json \
                  zip_md5.json
          git diff --cached --quiet \
            && echo "无变动，跳过" \
            || git commit -m \
              "Auto: 更新资源清单+DB $(date -u +'%Y-%m-%d %H:%M UTC')"
          n=0
          until git push || [ $n -ge 3 ]; do
            n=$((n+1))
            git pull --rebase --autostash origin main
            sleep $((n*3))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包"
          artifacts: |
            cn_base_00_db.zip
            madomagi/asset_main.json
            madomagi/asset_voice.json
            madomagi/asset_fullvoice.json
            url_map.json
            zip_md5.json
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build_hotupdate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build_all
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 检测翻译文件变动
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          HAS=0
          echo "$CHANGED" | grep -qE '^madomagi/resource/scenario/' && HAS=1
          echo "$CHANGED" | grep -qE '^magica/js/' && HAS=1
          echo "HAS=$HAS" >> $GITHUB_OUTPUT

      - name: 打包热更
        if: steps.detect.outputs.HAS == '1'
        run: |
          mkdir -p _pack/madomagi/resource/scenario/json
          mkdir -p _pack/magica/js
          [ -d madomagi/resource/scenario/json ] && \
            cp -r madomagi/resource/scenario/json/. \
                  _pack/madomagi/resource/scenario/json/
          [ -d magica/js ] && \
            cp -r magica/js/. _pack/magica/js/
          cd _pack && zip -r ../cn_hotupdate.zip madomagi/ magica/ && cd ..
          echo "热更包内容:"
          unzip -l cn_hotupdate.zip

      - name: 更新 version.json 并发布
        if: steps.detect.outputs.HAS == '1'
        run: |
          git config user.name  "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git config rebase.autoStash true
          git pull --rebase --autostash origin main
          python3 - <<'EOF'
          import json, hashlib, os
          f = "version.json"
          d = json.load(open(f)) if os.path.exists(f) \
              else {"version": 0, "size": 0, "md5": ""}
          h = hashlib.md5()
          size = 0
          with open("cn_hotupdate.zip", "rb") as fp:
              for chunk in iter(lambda: fp.read(1024*1024), b""):
                  h.update(chunk)
                  size += len(chunk)
          d["version"] += 1
          d["size"]     = size
          d["md5"]      = h.hexdigest()
          json.dump(d, open(f, "w"), indent=2)
          print(json.dumps(d, indent=2))
          EOF
          git add version.json
          VER=$(python3 -c \
            'import json; print(json.load(open("version.json"))["version"])')
          git commit -m "Auto: 热更 v${VER}" || true
          n=0
          until git push || [ $n -ge 3 ]; do
            n=$((n+1))
            git pull --rebase --autostash origin main
            sleep $((n*3))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        if: steps.detect.outputs.HAS == '1'
        with:
          allowUpdates: true
          tag: "latest"
          artifacts: "cn_hotupdate.zip"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
