name: MagiaCN Asset Pipeline

on:
  push:
    branches: [main]

jobs:
  # ============================================================
  # JS 热更：只在 JS 源文件变动时触发，产物名固定 cn_hotupdate_js.zip
  # ============================================================
  build_js:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      contains(toJson(github.event.commits.*.modified), 'magica/js/') ||
      contains(toJson(github.event.commits.*.modified), 'Build_JS_Injector.py')
    steps:
      - uses: actions/checkout@v3

      - name: 生成并打包 JS 热更包
        run: |
          sudo apt-get install -y python3 zip
          python3 Build_JS_Injector.py
          zip cn_hotupdate_js.zip magica/js/libs/jquery-3.7.1.min.js
          SIZE=$(stat -c%s cn_hotupdate_js.zip)
          MD5=$(md5sum cn_hotupdate_js.zip | cut -d' ' -f1)
          echo "JS包 size=${SIZE} md5=${MD5}"
          echo "JS_SIZE=${SIZE}" >> $GITHUB_ENV
          echo "JS_MD5=${MD5}" >> $GITHUB_ENV

      - name: 更新 version_js.json
        run: |
          python3 - <<'EOF'
          import json, os
          f = 'version_js.json'
          d = json.load(open(f)) if os.path.exists(f) else {'version': 0, 'size': 0, 'md5': ''}
          d['version'] += 1
          d['size'] = int(os.environ['JS_SIZE'])
          d['md5'] = os.environ['JS_MD5']
          json.dump(d, open(f, 'w'), indent=4)
          EOF

      - name: 提交并发布
        run: |
          git config user.name "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git add version_js.json
          git commit -m "Auto: JS热更 v$(cat version_js.json | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"version\"])')" || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包"
          artifacts: "cn_hotupdate_js.zip"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 剧情热更：只在 scenario 变动时触发，产物名固定 cn_hotupdate_scenario.zip
  # ============================================================
  build_scenario:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      contains(toJson(github.event.commits.*.modified), 'madomagi/resource/scenario/json/')
    steps:
      - uses: actions/checkout@v3

      - name: 打包剧情热更包
        run: |
          sudo apt-get install -y zip
          zip -r cn_hotupdate_scenario.zip madomagi/resource/scenario/json/
          SIZE=$(stat -c%s cn_hotupdate_scenario.zip)
          MD5=$(md5sum cn_hotupdate_scenario.zip | cut -d' ' -f1)
          echo "剧情包 size=${SIZE} md5=${MD5}"
          echo "SCN_SIZE=${SIZE}" >> $GITHUB_ENV
          echo "SCN_MD5=${MD5}" >> $GITHUB_ENV

      - name: 更新 version_scenario.json
        run: |
          python3 - <<'EOF'
          import json, os
          f = 'version_scenario.json'
          d = json.load(open(f)) if os.path.exists(f) else {'version': 0, 'size': 0, 'md5': ''}
          d['version'] += 1
          d['size'] = int(os.environ['SCN_SIZE'])
          d['md5'] = os.environ['SCN_MD5']
          json.dump(d, open(f, 'w'), indent=4)
          EOF

      - name: 提交并发布
        run: |
          git config user.name "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git add version_scenario.json
          git commit -m "Auto: 剧情热更 v$(cat version_scenario.json | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"version\"])')" || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包"
          artifacts: "cn_hotupdate_scenario.zip"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 资源清单生成：任何推送都重新计算 MD5，生成 asset_main_cn.json
  # ============================================================
  build_manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: 计算所有 R2+GitHub 文件 MD5，生成 asset_main_cn.json
        run: |
          sudo apt-get install -y curl python3

          python3 - <<'PYEOF'
          import subprocess, json, os, hashlib, urllib.request

          # ── R2 静态包（大概率不再变动）──────────────────────
          R2_BASE = "https://restless-field-06c7.crynetsystemscell.workers.dev"
          R2_FILES = [
              "cn_base_02.zip",
              "cn_base_03.zip",
              "cn_base_04.zip",
              "cn_base_05.zip",
              "cn_base_06.zip",
              "cn_magica_resource.zip",
              "cn_scenario_img.zip",
              "cn_voice_01.zip",
              "cn_voice_02_done.zip",
          ]

          # ── GitHub Release 包（会随热更变动）────────────────
          GH_BASE = "https://github.com/HiiragiNemu/magireco-cn-patch/releases/download/latest"
          GH_FILES = [
              "cn_base_00_db.zip",
              "cn_base_01_json.zip",
          ]

          entries = []

          def calc_md5_url(url):
              print(f"  下载计算MD5: {url}")
              req = urllib.request.urlopen(url, timeout=120)
              h = hashlib.md5()
              size = 0
              while True:
                  chunk = req.read(1024*1024)
                  if not chunk:
                      break
                  h.update(chunk)
                  size += len(chunk)
              return h.hexdigest(), size

          for fname in R2_FILES:
              url = f"{R2_BASE}/{fname}"
              fake_path = f"cn_zips/{fname}"
              md5, size = calc_md5_url(url)
              entries.append({
                  "file_list": [{"size": size, "url": fake_path}],
                  "md5": md5,
                  "path": fake_path,
                  "_real_url": url   # 仅供 C++ hook 参考，游戏不解析此字段
              })
              print(f"  {fname}: size={size}, md5={md5}")

          for fname in GH_FILES:
              url = f"{GH_BASE}/{fname}"
              fake_path = f"cn_zips/{fname}"
              md5, size = calc_md5_url(url)
              entries.append({
                  "file_list": [{"size": size, "url": fake_path}],
                  "md5": md5,
                  "path": fake_path,
                  "_real_url": url
              })
              print(f"  {fname}: size={size}, md5={md5}")

          # 写入 asset_main_cn.json（游戏可解析的格式）
          # 去掉 _real_url，另存 url_map.json 供 C++ 使用
          game_entries = []
          url_map = {}
          for e in entries:
              game_entries.append({
                  "file_list": e["file_list"],
                  "md5": e["md5"],
                  "path": e["path"]
              })
              url_map[e["path"]] = e["_real_url"]

          json.dump(game_entries, open("asset_main_cn.json", "w"), separators=(',',':'))
          json.dump(url_map, open("url_map.json", "w"), indent=2)
          print(f"\n生成完毕: {len(game_entries)} 个条目")
          PYEOF

      - name: 提交 asset_main_cn.json 和 url_map.json
        run: |
          git config user.name "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git add asset_main_cn.json url_map.json
          git commit -m "Auto: 更新资源清单 MD5" || echo "无变动"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包"
          artifacts: "asset_main_cn.json,url_map.json"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
