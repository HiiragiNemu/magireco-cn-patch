name: MagiaCN Asset Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 git
        run: |
          git config user.name  "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git config rebase.autoStash true

      - name: 安装依赖
        run: |
          pip3 install requests
          sudo apt-get install -y sqlite3

      - name: 计算ZIP的MD5和Size，生成所有JSON
        run: |
          python3 - <<'PYEOF'
          import requests, hashlib, json, io

          R2 = "https://restless-field-06c7.crynetsystemscell.workers.dev"
          GH = "https://github.com/HiiragiNemu/magireco-cn-patch/releases/download/latest"

          def calc(url):
              """下载ZIP，计算其整体MD5和大小"""
              print(f"[计算] {url}")
              r = requests.get(url, stream=True, timeout=600, allow_redirects=True)
              r.raise_for_status()
              h = hashlib.md5()
              size = 0
              for chunk in r.iter_content(4*1024*1024):
                  h.update(chunk)
                  size += len(chunk)
              md5 = h.hexdigest()
              print(f"       size={size} md5={md5}")
              return size, md5

          def make_entry(fake_path, size, md5):
              """生成符合官方格式的JSON条目"""
              return {
                  "file_list": [{"size": size, "url": fake_path}],
                  "md5":  md5,
                  "path": fake_path
              }

          # ── asset_main.json ──────────────────────────────────
          # 包含所有主资源包（除voice和movie）
          main_zips = [
              ("cn_zips/cn_base_01_json.zip", f"{GH}/cn_base_01_json.zip"),
              ("cn_zips/cn_base_02.zip",       f"{R2}/cn_base_02.zip"),
              ("cn_zips/cn_base_03.zip",       f"{R2}/cn_base_03.zip"),
              ("cn_zips/cn_base_04.zip",       f"{R2}/cn_base_04.zip"),
              ("cn_zips/cn_base_05.zip",       f"{R2}/cn_base_05.zip"),
              ("cn_zips/cn_base_06.zip",       f"{R2}/cn_base_06.zip"),
              ("cn_zips/cn_magica_resource.zip", f"{R2}/cn_magica_resource.zip"),
              ("cn_zips/cn_scenario_img.zip",  f"{R2}/cn_scenario_img.zip"),
              ("cn_zips/cn_base_00_db.zip",    f"{GH}/cn_base_00_db.zip"),
          ]

          asset_main = []
          zip_info   = {}   # fake_path → {size, md5, real_url}

          for fake_path, real_url in main_zips:
              size, md5 = calc(real_url)
              asset_main.append(make_entry(fake_path, size, md5))
              zip_info[fake_path] = {"size": size, "md5": md5, "real_url": real_url}

          # ── asset_voice.json ─────────────────────────────────
          size_v1, md5_v1 = calc(f"{R2}/cn_voice_01.zip")
          zip_info["cn_zips/cn_voice_01.zip"] = {
              "size": size_v1, "md5": md5_v1,
              "real_url": f"{R2}/cn_voice_01.zip"
          }
          asset_voice = [make_entry("cn_zips/cn_voice_01.zip", size_v1, md5_v1)]

          # ── asset_fullvoice.json ─────────────────────────────
          size_v2, md5_v2 = calc(f"{R2}/cn_voice_02_done.zip")
          zip_info["cn_zips/cn_voice_02_done.zip"] = {
              "size": size_v2, "md5": md5_v2,
              "real_url": f"{R2}/cn_voice_02_done.zip"
          }
          asset_fullvoice = [make_entry("cn_zips/cn_voice_02_done.zip", size_v2, md5_v2)]

          # ── 写入JSON文件到 madomagi/ 目录 ────────────────────
          import os
          os.makedirs("madomagi", exist_ok=True)

          def dump(path, obj):
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(obj, f, separators=(',', ':'), ensure_ascii=False)
              print(f"✓ {path} ({len(obj)} 条)")

          dump("madomagi/asset_main.json",      asset_main)
          dump("madomagi/asset_voice.json",      asset_voice)
          dump("madomagi/asset_fullvoice.json",  asset_fullvoice)

          # ── 写 url_map.json（供C++ Hook使用）────────────────
          url_map = {k: v["real_url"] for k, v in zip_info.items()}
          with open("url_map.json", "w") as f:
              json.dump(url_map, f, indent=2)
          print(f"✓ url_map.json ({len(url_map)} 条)")

          # ── 写 zip_md5.json（供DB生成使用）──────────────────
          with open("zip_md5.json", "w") as f:
              json.dump({k: {"size": v["size"], "md5": v["md5"]}
                         for k, v in zip_info.items()}, f, indent=2)
          print(f"✓ zip_md5.json")

          print("\n✅ 所有JSON生成完毕")
          PYEOF

      - name: 生成 madomagi.db（download_asset 表写入ZIP的MD5）
        run: |
          python3 - <<'PYEOF'
          import json, sqlite3, os, shutil

          ZMD5 = json.load(open("zip_md5.json"))

          # 如果仓库里有 madomagi.db 就用它，否则创建新的
          db_path = "madomagi/madomagi.db"
          if not os.path.exists(db_path):
              # 从 cn_base_00_db.zip 里已经解压了（CI里没有），创建空DB
              print("创建新 madomagi.db")

          conn = sqlite3.connect(db_path)
          cur  = conn.cursor()

          # 确保表存在
          cur.execute("""
              CREATE TABLE IF NOT EXISTS download_asset (
                  path TEXT PRIMARY KEY,
                  md5  TEXT NOT NULL
              )
          """)

          # 写入每个ZIP包的 path→md5
          # 游戏下载完 cn_zips/cn_base_02.zip 后会在DB记录这个path的md5
          # 我们预填，下次启动就不会重复下载
          count = 0
          for fake_path, info in ZMD5.items():
              cur.execute(
                  "INSERT OR REPLACE INTO download_asset (path, md5) VALUES (?, ?)",
                  (fake_path, info["md5"])
              )
              count += 1
              print(f"  {fake_path} → {info['md5']}")

          # 清空 asset_json 缓存
          cur.execute("SELECT name FROM sqlite_master WHERE type='table' AND name='asset_json'")
          if cur.fetchone():
              cur.execute("DELETE FROM asset_json")
              print("✓ asset_json 缓存已清空")

          conn.commit()
          conn.close()
          print(f"\n✅ madomagi.db 写入 {count} 条ZIP MD5记录")
          PYEOF

      - name: 重新打包 cn_base_00_db.zip（含更新后的DB）
        run: |
          mkdir -p _db_pack/files/madomagi
          cp madomagi/madomagi.db _db_pack/files/madomagi/
          cd _db_pack
          zip -r ../cn_base_00_db_new.zip files/
          cd ..
          echo "DB包大小: $(du -sh cn_base_00_db_new.zip | cut -f1)"

      - name: 安全提交所有生成文件
        run: |
          git pull --rebase --autostash origin main
          git add madomagi/asset_main.json \
                  madomagi/asset_voice.json \
                  madomagi/asset_fullvoice.json \
                  madomagi/madomagi.db \
                  url_map.json \
                  zip_md5.json
          git diff --cached --quiet \
            && echo "无变动" \
            || git commit -m "Auto: 更新资源清单和DB $(date -u +'%Y-%m-%d %H:%M UTC')"
          n=0
          until git push || [ $n -ge 3 ]; do
            n=$((n+1))
            git pull --rebase --autostash origin main
            sleep $((n*3))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包"
          artifacts: |
            cn_base_00_db_new.zip
            madomagi/asset_main.json
            madomagi/asset_voice.json
            madomagi/asset_fullvoice.json
            url_map.json
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # 热更包独立job
  build_hotupdate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build_all
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 检测翻译文件变动
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          HAS=0
          echo "$CHANGED" | grep -qE '^madomagi/resource/scenario/' && HAS=1
          echo "$CHANGED" | grep -qE '^magica/js/' && HAS=1
          echo "HAS=$HAS" >> $GITHUB_OUTPUT

      - name: 打包热更
        if: steps.detect.outputs.HAS == '1'
        run: |
          mkdir -p _pack/files/madomagi/resource/scenario/json
          mkdir -p _pack/files/magica/js
          [ -d madomagi/resource/scenario/json ] && \
            cp -r madomagi/resource/scenario/json/. \
                  _pack/files/madomagi/resource/scenario/json/
          [ -d magica/js ] && cp -r magica/js/. _pack/files/magica/js/
          cd _pack && zip -r ../cn_hotupdate.zip files/ && cd ..

      - name: 更新 version.json 并发布
        if: steps.detect.outputs.HAS == '1'
        run: |
          git config user.name  "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git config rebase.autoStash true
          git pull --rebase --autostash origin main
          python3 - <<'EOF'
          import json, hashlib, os
          f = "version.json"
          d = json.load(open(f)) if os.path.exists(f) \
              else {"version": 0, "size": 0, "md5": ""}
          raw = open("cn_hotupdate.zip","rb").read()
          d["version"] += 1
          d["size"]     = len(raw)
          d["md5"]      = hashlib.md5(raw).hexdigest()
          json.dump(d, open(f,"w"), indent=2)
          print(json.dumps(d, indent=2))
          EOF
          git add version.json
          VER=$(python3 -c 'import json;print(json.load(open("version.json"))["version"])')
          git commit -m "Auto: 热更 v${VER}" || true
          n=0
          until git push || [ $n -ge 3 ]; do
            n=$((n+1)); git pull --rebase --autostash origin main; sleep $((n*3))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        if: steps.detect.outputs.HAS == '1'
        with:
          allowUpdates: true
          tag: "latest"
          artifacts: "cn_hotupdate.zip"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
