name: MagiaCN Asset Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # 核心：从 ZIP 包内部文件生成 asset_main_cn.json
  # 格式完全匹配游戏解析格式
  # ============================================================
  build_manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: 安装依赖
        run: |
          sudo apt-get install -y python3 python3-pip curl unzip
          pip3 install requests

      - name: 下载所有 ZIP 并生成 asset_main_cn.json
        run: |
          python3 - <<'PYEOF'
          import os, hashlib, json, zipfile, requests, io

          # ── 数据源配置 ──────────────────────────────────────
          R2  = "https://restless-field-06c7.crynetsystemscell.workers.dev"
          GH  = "https://github.com/HiiragiNemu/magireco-cn-patch/releases/download/latest"

          # ZIP 包列表（按安装顺序，DB 最后）
          ZIPS = [
              f"{GH}/cn_base_01_json.zip",
              f"{R2}/cn_base_02.zip",
              f"{R2}/cn_base_03.zip",
              f"{R2}/cn_base_04.zip",
              f"{R2}/cn_base_05.zip",
              f"{R2}/cn_base_06.zip",
              f"{R2}/cn_magica_resource.zip",
              f"{R2}/cn_scenario_img.zip",
              f"{GH}/cn_base_00_db.zip",       # DB 最后
          ]

          # 热更包（若存在则也处理）
          HOTUPDATE_URL = f"{GH}/cn_hotupdate.zip"

          def md5_of_bytes(data: bytes) -> str:
              return hashlib.md5(data).hexdigest()

          def download_zip(url: str) -> bytes:
              print(f"  [下载] {url}")
              r = requests.get(url, timeout=300,
                               allow_redirects=True, stream=True)
              r.raise_for_status()
              buf = io.BytesIO()
              total = 0
              for chunk in r.iter_content(1024 * 1024):
                  buf.write(chunk)
                  total += len(chunk)
              print(f"         ✓ {total/1024/1024:.1f} MB")
              return buf.getvalue()

          # 路径前缀规范化：
          # ZIP 内的路径可能是  resource/xxx  或  madomagi/resource/xxx
          # 统一去掉前缀，最终 path = resource/xxx（相对于 madomagi/）
          def normalize_path(p: str) -> str:
              for prefix in ("madomagi/", "./madomagi/", "./"):
                  if p.startswith(prefix):
                      p = p[len(prefix):]
              return p

          entries = {}  # path → {size, md5, url}  用 dict 去重，后者覆盖前者

          for zip_url in ZIPS:
              try:
                  raw = download_zip(zip_url)
              except Exception as e:
                  print(f"  [警告] 下载失败跳过: {e}")
                  continue

              with zipfile.ZipFile(io.BytesIO(raw)) as zf:
                  names = [n for n in zf.namelist() if not n.endswith('/')]
                  print(f"  [解析] {len(names)} 个文件")
                  for name in names:
                      data = zf.read(name)
                      path = normalize_path(name)
                      md5  = md5_of_bytes(data)
                      size = len(data)
                      entries[path] = {"size": size, "md5": md5, "url": path}

          # 转为游戏格式列表
          game_json = []
          for path, info in sorted(entries.items()):
              game_json.append({
                  "file_list": [{"size": info["size"], "url": info["url"]}],
                  "md5":  info["md5"],
                  "path": path
              })

          # 写入 asset_main_cn.json
          with open("asset_main_cn.json", "w", encoding="utf-8") as f:
              json.dump(game_json, f, separators=(',', ':'), ensure_ascii=False)

          # 同时生成一份 version.json 的 size 字段（指热更 ZIP 自身大小）
          try:
              raw_hot = download_zip(HOTUPDATE_URL)
              hot_size = len(raw_hot)
              hot_md5  = md5_of_bytes(raw_hot)
          except:
              hot_size = 0
              hot_md5  = "000"

          ver_file = "version.json"
          try:
              ver = json.load(open(ver_file))
          except:
              ver = {"version": 0, "size": 0, "md5": ""}
          # version 字段由手动推送更新，这里只更新 size/md5
          ver["size"] = hot_size
          ver["md5"]  = hot_md5
          json.dump(ver, open(ver_file, "w"), indent=2)

          print(f"\n✅ 生成完毕: {len(game_json)} 条记录 → asset_main_cn.json")
          PYEOF

      - name: 提交文件
        run: |
          git config user.name  "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git add asset_main_cn.json version.json
          git diff --cached --quiet && echo "无变动，跳过提交" || \
            git commit -m "Auto: 更新资源清单 $(date +'%Y-%m-%d %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包"
          artifacts: "asset_main_cn.json"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 热更包：JS / 剧情有变动时自动打包并递增 version.json
  # ============================================================
  build_hotupdate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: []   # 与 build_manifest 并行
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: 检测变动并打包
        id: pack
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "变动文件: $CHANGED"

          HAS_CHANGE=0
          # JS 变动
          if echo "$CHANGED" | grep -q 'magica/js/'; then
            python3 Build_JS_Injector.py 2>/dev/null || true
            HAS_CHANGE=1
          fi
          # 剧情变动
          if echo "$CHANGED" | grep -q 'madomagi/resource/scenario/'; then
            HAS_CHANGE=1
          fi

          if [ "$HAS_CHANGE" = "1" ]; then
            # 打包所有热更内容
            zip -r cn_hotupdate.zip \
              magica/js/ \
              madomagi/resource/scenario/json/ \
              2>/dev/null || true
            echo "HAS_CHANGE=1" >> $GITHUB_OUTPUT
          fi

      - name: 更新 version.json（递增 version 字段）
        if: steps.pack.outputs.HAS_CHANGE == '1'
        run: |
          python3 - <<'EOF'
          import json, hashlib, os
          f = "version.json"
          d = json.load(open(f)) if os.path.exists(f) \
              else {"version": 0, "size": 0, "md5": ""}
          data = open("cn_hotupdate.zip", "rb").read()
          d["version"] += 1          # ← 版本号递增，触发客户端热更
          d["size"]     = len(data)
          d["md5"]      = hashlib.md5(data).hexdigest()
          json.dump(d, open(f, "w"), indent=2)
          print(json.dumps(d, indent=2))
          EOF

      - name: 提交并发布
        if: steps.pack.outputs.HAS_CHANGE == '1'
        run: |
          git config user.name  "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git add version.json
          VER=$(python3 -c \
            'import json;print(json.load(open("version.json"))["version"])')
          git commit -m "Auto: 热更 v${VER}" || true
          git push
          echo "发布热更包 v${VER}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        if: steps.pack.outputs.HAS_CHANGE == '1'
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包"
          artifacts: "cn_hotupdate.zip"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
