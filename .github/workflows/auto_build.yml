name: MagiaCN Build Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 检测修改路径
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            js_source:
              - 'magica/js/libs/**'
              - 'original_source/**'
              - 'Build_JS_Injector.py'
            scenario:
              - 'madomagi/resource/scenario/json/**'

      - name: 安装工具
        run: sudo apt-get install -y zip python3

      # ==========================================
      # JS修改：运行注入脚本，只打包生成的单个js文件
      # ==========================================
      - name: 生成并打包 JS 热更包
        if: steps.filter.outputs.js_source == 'true'
        run: |
          python3 Build_JS_Injector.py
          echo "=== 只打包编译后的单个js文件 ==="
          zip cn_hotupdate.zip magica/js/libs/jquery-3.7.1.min.js
          SIZE=$(stat -c%s cn_hotupdate.zip)
          echo "JS热更包大小: ${SIZE} 字节"
          echo "BUILD_TYPE=js" >> $GITHUB_ENV
          echo "ZIP_SIZE=${SIZE}" >> $GITHUB_ENV

      # ==========================================
      # 剧情修改：只打包 scenario/json 目录
      # ==========================================
      - name: 打包剧情热更包
        if: steps.filter.outputs.scenario == 'true' && steps.filter.outputs.js_source == 'false'
        run: |
          echo "=== 只打包 scenario/json 目录 ==="
          zip -r cn_hotupdate.zip madomagi/resource/scenario/json/
          SIZE=$(stat -c%s cn_hotupdate.zip)
          echo "剧情热更包大小: ${SIZE} 字节"
          echo "BUILD_TYPE=scenario" >> $GITHUB_ENV
          echo "ZIP_SIZE=${SIZE}" >> $GITHUB_ENV

      # ==========================================
      # JS + 剧情同时修改：两者都打包进同一个zip
      # ==========================================
      - name: 打包 JS+剧情 合并热更包
        if: steps.filter.outputs.js_source == 'true' && steps.filter.outputs.scenario == 'true'
        run: |
          python3 Build_JS_Injector.py
          echo "=== 打包 JS + 剧情 ==="
          zip cn_hotupdate.zip magica/js/libs/jquery-3.7.1.min.js
          zip -r cn_hotupdate.zip madomagi/resource/scenario/json/
          SIZE=$(stat -c%s cn_hotupdate.zip)
          echo "合并热更包大小: ${SIZE} 字节"
          echo "BUILD_TYPE=combined" >> $GITHUB_ENV
          echo "ZIP_SIZE=${SIZE}" >> $GITHUB_ENV

      # ==========================================
      # 更新 version.json
      # ==========================================
      - name: 更新 version.json
        if: env.ZIP_SIZE != ''
        run: |
          python3 - <<'EOF'
          import json, os
          f = 'version.json'
          d = json.load(open(f)) if os.path.exists(f) else {'version': 0, 'size': 0}
          d['version'] += 1
          d['size'] = int(os.environ['ZIP_SIZE'])
          json.dump(d, open(f, 'w'), indent=4)
          print(f"version.json 更新: version={d['version']}, size={d['size']}")
          EOF

      # ==========================================
      # 提交 version.json
      # ==========================================
      - name: 提交 version.json
        if: env.ZIP_SIZE != ''
        run: |
          git config user.name "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git add version.json
          git commit -m "Auto: 更新 version.json [${BUILD_TYPE}]" || echo "无变动"
          git push

      # ==========================================
      # 发布 Release
      # ==========================================
      - name: 发布到 GitHub Releases
        if: env.ZIP_SIZE != ''
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包"
          artifacts: "cn_hotupdate.zip"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
