name: MagiaCN Asset Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 git
        run: |
          git config user.name  "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git config rebase.autoStash true

      - name: 安装依赖
        run: pip3 install requests

      - name: 下载所有ZIP，逐文件计算MD5，生成 asset_main_cn.json
        run: |
          python3 - <<'PYEOF'
          import os, hashlib, json, zipfile, requests, io, datetime

          R2 = "https://restless-field-06c7.crynetsystemscell.workers.dev"
          GH = "https://github.com/HiiragiNemu/magireco-cn-patch/releases/download/latest"

          # 全部ZIP，覆盖整个resource（除movie）
          # DB最后，保证安装顺序
          ZIPS = [
              f"{GH}/cn_base_01_json.zip",
              f"{R2}/cn_base_02.zip",
              f"{R2}/cn_base_03.zip",
              f"{R2}/cn_base_04.zip",
              f"{R2}/cn_base_05.zip",
              f"{R2}/cn_base_06.zip",
              f"{R2}/cn_magica_resource.zip",
              f"{R2}/cn_scenario_img.zip",
              f"{GH}/cn_base_00_db.zip",
          ]

          # 热更包（若存在，其内容覆盖基础包的同名文件）
          HOTUPDATE_URL = f"{GH}/cn_hotupdate.zip"

          def download_zip(url):
              print(f"\n[下载] {url}")
              r = requests.get(url, timeout=600,
                               allow_redirects=True, stream=True)
              r.raise_for_status()
              buf = io.BytesIO()
              total = 0
              for chunk in r.iter_content(4 * 1024 * 1024):
                  buf.write(chunk)
                  total += len(chunk)
              print(f"       ✓ {total/1024/1024:.1f} MB")
              return buf.getvalue()

          def normalize(p):
              """
              files/madomagi/resource/xxx  →  resource/xxx   ✓ 写入JSON
              files/madomagi/madomagi.db   →  madomagi.db    ✓ 写入JSON
              files/magica/xxx             →  None            跳过
              """
              p = p.replace("\\", "/")
              if p.startswith("./"): p = p[2:]
              if p.endswith("/"): return None

              for prefix in ("files/madomagi/", "madomagi/"):
                  if p.startswith(prefix):
                      return p[len(prefix):]

              # magica/ 不属于游戏asset管理，跳过
              if p.startswith("files/magica/") or p.startswith("magica/"):
                  return None

              # 直接就是相对路径的情况
              if p.startswith("resource/") or p == "madomagi.db":
                  return p

              print(f"  [跳过未知路径] {p}")
              return None

          entries = {}  # rel_path → {size, md5}

          for zip_url in ZIPS:
              try:
                  raw = download_zip(zip_url)
              except Exception as e:
                  print(f"  [警告] 下载失败，跳过: {e}")
                  continue

              with zipfile.ZipFile(io.BytesIO(raw)) as zf:
                  names = [n for n in zf.namelist() if not n.endswith("/")]
                  print(f"  [解析] {len(names)} 个文件")
                  skipped = 0
                  for name in names:
                      rel = normalize(name)
                      if rel is None:
                          skipped += 1
                          continue
                      data = zf.read(name)
                      # 后续ZIP覆盖前面同名文件（热更逻辑也如此）
                      entries[rel] = {
                          "size": len(data),
                          "md5":  hashlib.md5(data).hexdigest()
                      }
                  if skipped:
                      print(f"  [跳过magica/等] {skipped} 个")

          # 热更包（若存在，内容优先级最高）
          try:
              raw_hot = download_zip(HOTUPDATE_URL)
              with zipfile.ZipFile(io.BytesIO(raw_hot)) as zf:
                  names = [n for n in zf.namelist() if not n.endswith("/")]
                  print(f"  [热更包] {len(names)} 个文件（覆盖基础包同名文件）")
                  for name in names:
                      rel = normalize(name)
                      if rel is None: continue
                      data = zf.read(name)
                      entries[rel] = {
                          "size": len(data),
                          "md5":  hashlib.md5(data).hexdigest()
                      }
          except Exception as e:
              print(f"  [热更包] 不存在或下载失败，跳过: {e}")

          # 生成游戏格式 JSON
          # url 字段写相对路径（与游戏官方格式完全一致）
          # MD5 匹配时游戏不会触发下载，url实际不会被使用
          game_json = []
          for path in sorted(entries.keys()):
              info = entries[path]
              game_json.append({
                  "file_list": [{"size": info["size"], "url": path}],
                  "md5":  info["md5"],
                  "path": path
              })

          with open("asset_main_cn.json", "w", encoding="utf-8") as f:
              json.dump(game_json, f,
                        separators=(',', ':'),
                        ensure_ascii=False)

          now = datetime.datetime.now(datetime.timezone.utc).isoformat()
          summary = {
              "total": len(game_json),
              "generated_at": now
          }
          with open("manifest_summary.json", "w") as f:
              json.dump(summary, f, indent=2)

          print(f"\n✅ 生成完毕: {len(game_json)} 条记录")
          print(f"   时间: {now}")
          PYEOF

      - name: 提交（autostash彻底解决冲突）
        run: |
          # autostash：自动暂存Action生成的文件，rebase后自动恢复
          git pull --rebase --autostash origin main

          git add asset_main_cn.json manifest_summary.json

          if git diff --cached --quiet; then
            echo "内容无变动，跳过提交"
          else
            git commit -m "Auto: 资源清单 $(date -u +'%Y-%m-%d %H:%M UTC')"
            # 带重试的push
            n=0
            until git push || [ $n -ge 3 ]; do
              n=$((n+1))
              echo "Push失败，第${n}次重试..."
              git pull --rebase --autostash origin main
              sleep $((n * 3))
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包"
          artifacts: "asset_main_cn.json"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 热更包：翻译文件变动时自动打包 + 递增 version.json
  # ============================================================
  build_hotupdate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build_manifest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 git
        run: |
          git config user.name  "MagiaCN AutoBot"
          git config user.email "bot@magiacn.com"
          git config rebase.autoStash true

      - name: 检测翻译文件变动
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "变动文件:"
          echo "$CHANGED"
          HAS=0
          if echo "$CHANGED" | grep -qE \
            '^(magica/|madomagi/resource/scenario/|madomagi/resource/js/)'; then
            HAS=1
          fi
          echo "HAS=$HAS" >> $GITHUB_OUTPUT

      - name: 打包热更（保持 files/ 目录结构）
        if: steps.detect.outputs.HAS == '1'
        run: |
          mkdir -p _pack/files/madomagi/resource/scenario/json
          mkdir -p _pack/files/madomagi/resource/js
          mkdir -p _pack/files/magica/js

          [ -d madomagi/resource/scenario/json ] && \
            cp -r madomagi/resource/scenario/json/. \
                  _pack/files/madomagi/resource/scenario/json/

          [ -d madomagi/resource/js ] && \
            cp -r madomagi/resource/js/. \
                  _pack/files/madomagi/resource/js/

          if [ -d magica/js ]; then
            python3 Build_JS_Injector.py 2>/dev/null || true
            cp -r magica/js/. _pack/files/magica/js/
          fi

          cd _pack && zip -r ../cn_hotupdate.zip files/ && cd ..
          echo "热更包: $(du -sh cn_hotupdate.zip | cut -f1)"

      - name: 更新 version.json 并发布
        if: steps.detect.outputs.HAS == '1'
        run: |
          git pull --rebase --autostash origin main

          python3 - <<'EOF'
          import json, hashlib, os
          f   = "version.json"
          d   = json.load(open(f)) if os.path.exists(f) \
                else {"version": 0, "size": 0, "md5": ""}
          raw = open("cn_hotupdate.zip", "rb").read()
          d["version"] += 1
          d["size"]     = len(raw)
          d["md5"]      = hashlib.md5(raw).hexdigest()
          json.dump(d, open(f, "w"), indent=2)
          print(f"v{d['version']}  size={d['size']}  md5={d['md5']}")
          EOF

          git add version.json
          VER=$(python3 -c \
            'import json;print(json.load(open("version.json"))["version"])')
          git commit -m "Auto: 热更 v${VER}" || echo "无变动"

          n=0
          until git push || [ $n -ge 3 ]; do
            n=$((n+1))
            git pull --rebase --autostash origin main && sleep $((n*3))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1
        if: steps.detect.outputs.HAS == '1'
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包"
          artifacts: "cn_hotupdate.zip"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
