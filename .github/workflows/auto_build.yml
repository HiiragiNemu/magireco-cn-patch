name: MagiaCN Auto Build Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v3

      - name: 安装 Zip 工具
        run: sudo apt-get install zip -y

      - name: 运行 JS 翻译注入脚本
        run: |
          if [ -f "Build_JS_Injector.py" ]; then
            python3 Build_JS_Injector.py
          fi

      - name: 打包所有资源包
        run: |
          # 1. 数据库
          zip -r cn_base_00_db.zip madomagi/madomagi.db
          # 2. 清单JSON
          zip -r cn_base_01_json.zip madomagi/*.json
          # 3. 核心热更新包
          zip -r cn_hotupdate.zip magica/js/ madomagi/resource/scenario/
          
          # 更新 version.json 供 Java 层读取
          SIZE=$(stat -c%s "cn_hotupdate.zip")
          python3 -c "import json; d=json.load(open('version.json')); d['version']+=1; d['size']=$SIZE; json.dump(d, open('version.json','w'), indent=4)"

      - name: 仅提交文本变动到仓库
        run: |
          git config --local user.name "MagiaCN AutoBot"
          git config --local user.email "bot@magiacn.com"
          # 注意：这里我们绝对不再把 zip 塞进仓库里了！
          git add version.json magica/js/libs/jquery-3.7.1.min.js
          git commit -m "Auto Build: Update JSON and JS" || echo "No changes to commit"
          git push

      - name: 发布 ZIP 到 GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "最新汉化资源包 (自动更新)"
          body: "此页面包含最新构建的热更新补丁和基础数据库。由 GitHub Actions 自动打包。"
          artifacts: "*.zip"
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}